<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Оби Ватан — Администратор</title>
  <link rel="manifest" href="/admin-manifest.json"/>
  <meta name="theme-color" content="#00c9ff"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ОВ Админ"/>
  <link rel="apple-touch-icon" href="/icon-admin.svg"/>
  <link rel="stylesheet" href="admin.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <img src="logo.png" alt="Оби Ватан" class="login-logo"/>
    <h2>Панель администратора</h2>
    <p>Введите пароль для входа</p>
    <div class="login-field">
      <input type="password" id="pwInput" placeholder="Пароль"/>
      <button onclick="doLogin()">Войти</button>
    </div>
    <span class="login-err" id="loginErr"></span>
  </div>
</div>

<!-- ADMIN -->
<div class="admin" id="adminPanel" style="display:none">

  <header class="a-header">
    <div class="a-header-left">
      <img src="logo.png" alt="Оби Ватан" class="a-logo"/>
      <div class="a-title">
        <span>Панель администратора</span>
        <span class="a-date" id="aDate"></span>
      </div>
    </div>
    <div class="a-header-right">
      <div class="live-wrap"><div class="live-dot"></div><span>Авто-обновление</span></div>
      <button class="btn-logout" onclick="doLogout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Выйти
      </button>
    </div>
  </header>

  <main class="a-main">

    <!-- STATS -->
    <div class="stats-row">

      <div class="stat-box active-filter" onclick="filterBy('all')" style="cursor:pointer">
        <div class="stat-icon-wrap blue">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a78c2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
        </div>
        <div><div class="stat-val" id="sTotal">—</div><div class="stat-name">Все заказы</div></div>
      </div>

      <div class="stat-box" onclick="filterBy('new')" style="cursor:pointer">
        <div class="stat-icon-wrap yellow">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <div><div class="stat-val" id="sNew">—</div><div class="stat-name">Новые заказы</div></div>
      </div>

      <div class="stat-box" onclick="filterBy('delivering')" style="cursor:pointer">
        <div class="stat-icon-wrap orange">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ea580c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="3" width="15" height="13" rx="2"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
          </svg>
        </div>
        <div><div class="stat-val" id="sOnWay">—</div><div class="stat-name">В пути</div></div>
      </div>

      <div class="stat-box" onclick="filterBy('delivered')" style="cursor:pointer">
        <div class="stat-icon-wrap green">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <div><div class="stat-val" id="sDelivered">—</div><div class="stat-name">Доставлено сегодня</div></div>
      </div>

      <div class="stat-box accent">
        <div class="stat-icon-wrap white-ico">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </div>
        <div><div class="stat-val wh" id="sRevenue">—</div><div class="stat-name wh">Выручка сегодня</div></div>
      </div>

    </div>

    <!-- PANELS -->
    <div class="charts-row">

      <div class="panel" id="ordersPanel">
        <div class="panel-head">
          <h3>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span>Заказы за сегодня</span>
          </h3>
          <button class="btn-refresh" onclick="loadData()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Обновить
          </button>
        </div>
        <div id="todayOrders"></div>
      </div>

      <div class="panel narrow">
        <div class="panel-head">
          <h3>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            За 7 дней
          </h3>
        </div>
        <div id="weekStats"></div>

        <div class="panel-head" style="margin-top:28px">
          <h3>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
            Популярность
          </h3>
        </div>
        <div id="productStats"></div>

        <div class="panel-head" style="margin-top:28px">
          <h3>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="1" y="3" width="15" height="13" rx="2"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            Водители
          </h3>
        </div>
        <div id="driverStats"></div>

        <div class="panel-head" style="margin-top:28px">
          <h3>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Клиенты
          </h3>
        </div>
        <div id="clientsStats"></div>
      </div>

    </div>
  </main>
</div>

<script src="admin.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
