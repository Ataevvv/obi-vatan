<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a3e"/>
      <stop offset="100%" stop-color="#2d1566"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f1fc8"/>
    </linearGradient>
    <linearGradient id="key-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Subtle dots pattern -->
  <circle cx="100" cy="100" r="2" fill="rgba(255,255,255,0.06)"/>
  <circle cx="200" cy="80" r="2" fill="rgba(255,255,255,0.06)"/>
  <circle cx="320" cy="100" r="2" fill="rgba(255,255,255,0.06)"/>
  <circle cx="420" cy="80" r="2" fill="rgba(255,255,255,0.06)"/>
  <circle cx="80" cy="200" r="2" fill="rgba(255,255,255,0.06)"/>
  <circle cx="430" cy="200" r="2" fill="rgba(255,255,255,0.06)"/>
  <circle cx="100" cy="400" r="2" fill="rgba(255,255,255,0.06)"/>
  <circle cx="410" cy="420" r="2" fill="rgba(255,255,255,0.06)"/>

  <!-- Shield body -->
  <path d="M256 78 L370 122 L370 248 C370 316 320 368 256 395 C192 368 142 316 142 248 L142 122 Z"
        fill="url(#shield-grad)" filter="url(#glow)" opacity="0.95"/>

  <!-- Shield inner highlight -->
  <path d="M256 100 L352 138 L352 248 C352 306 310 350 256 374 C202 350 160 306 160 248 L160 138 Z"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- Shield shine -->
  <ellipse cx="210" cy="165" rx="28" ry="50" fill="rgba(255,255,255,0.08)" transform="rotate(-15 210 165)"/>

  <!-- Key circle (top) -->
  <circle cx="256" cy="218" r="44" fill="none" stroke="url(#key-grad)" stroke-width="16"/>
  <circle cx="256" cy="218" r="26" fill="none" stroke="rgba(251,191,36,0.3)" stroke-width="6"/>

  <!-- Key shaft -->
  <rect x="244" y="258" width="24" height="72" rx="6" fill="url(#key-grad)"/>
  <!-- Key teeth -->
  <rect x="268" y="282" width="16" height="12" rx="3" fill="url(#key-grad)"/>
  <rect x="268" y="304" width="12" height="10" rx="3" fill="url(#key-grad)"/>

  <!-- Bottom label -->
  <text x="256" y="470" text-anchor="middle" font-family="Arial,sans-serif" font-size="34" font-weight="900" fill="rgba(255,255,255,0.30)" letter-spacing="2">ОБИ ВАТАН</text>
</svg>
